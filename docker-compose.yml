# Private AI search you own — Ollama + Qdrant + FastAPI, one command.
# Everything runs locally; no data leaves this machine.
#   docker compose up --build
services:
  # Local LLM + embeddings.
  ollama:
    image: ollama/ollama:latest
    # Bound to localhost — these services are unauthenticated; don't expose them
    # on a VPS/LAN. The API reaches them over the internal compose network.
    ports: ['127.0.0.1:11434:11434']
    volumes: ['ollama:/root/.ollama']
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 12

  # Pulls the embedding + chat models into Ollama, then exits.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama: { condition: service_healthy }
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ['/bin/sh', '-c']
    command: >
      "ollama pull ${EMBED_MODEL:-nomic-embed-text} &&
       ollama pull ${CHAT_MODEL:-llama3.1}"
    restart: 'no'

  # Self-hosted vector database.
  qdrant:
    image: qdrant/qdrant:latest
    ports: ['127.0.0.1:6333:6333']
    volumes: ['qdrant:/qdrant/storage']

  # Ingest + ask API.
  api:
    build: ./api
    ports: ['127.0.0.1:8000:8000']
    environment:
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      CHAT_MODEL: ${CHAT_MODEL:-llama3.1}
      COLLECTION: ${COLLECTION:-aquila}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-150}
      TOP_K: ${TOP_K:-5}
    volumes:
      - ./data:/app/data
    depends_on:
      qdrant: { condition: service_started }
      ollama-pull: { condition: service_completed_successfully }

volumes:
  ollama:
  qdrant:
